services:
  # API Gateway
  gateway:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-gateway:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    profiles:
      - dev
      - prod
      - gateway
    environment:
      - PORT=3000
      - NODE_ENV=production
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - ACTIVITY_SERVICE_URL=http://activity-service:3006
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - network

  # Auth Service
  auth-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-auth-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_auth_service
    restart: unless-stopped
    ports:
      - '3001:3001'
    profiles:
      - dev
      - prod
      - auth
    environment:
      - PORT=3001
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}_auth?authSource=admin
      - RABBITMQ_URL=amqp://rabbitmq:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - network

  # Product Service
  product-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-product-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_product_service
    restart: unless-stopped
    ports:
      - '3002:3002'
    profiles:
      - dev
      - prod
      - product
    environment:
      - PORT=3002
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}_product?authSource=admin
      - RABBITMQ_URL=amqp://rabbitmq:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - network

  # Order Service
  order-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-order-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_order_service
    restart: unless-stopped
    ports:
      - '3003:3003'
    profiles:
      - dev
      - prod
      - order
    environment:
      - PORT=3003
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}_order?authSource=admin
      - RABBITMQ_URL=amqp://rabbitmq:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - network

  # Payment Service
  payment-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-payment-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_payment_service
    restart: unless-stopped
    ports:
      - '3005:3005'
    profiles:
      - dev
      - prod
      - payment
    environment:
      - PORT=3005
      - NODE_ENV=production
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ORDER_SERVICE_URL=http://order-service:3003
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      - order-service
      - product-service
    networks:
      - network

  # Activity Service
  activity-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-activity-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_activity_service
    restart: unless-stopped
    ports:
      - '3006:3006'
    profiles:
      - dev
      - prod
      - activity
    environment:
      - PORT=3006
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}_activity?authSource=admin
      - RABBITMQ_URL=amqp://rabbitmq:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - network

  # Notification Service
  notification-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-notification-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_notification_service
    restart: unless-stopped
    ports:
      - '3004:3004'
    profiles:
      - dev
      - prod
      - notification
    environment:
      - PORT=3004
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}_notification?authSource=admin
      - RABBITMQ_URL=amqp://rabbitmq:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@vortex.local}
      - APP_URL=${APP_URL:-http://localhost:3000}
    depends_on:
      - rabbitmq
    networks:
      - network

  # Web (Next.js)
  web:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-web:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_web
    restart: unless-stopped
    ports:
      - '3008:3008'
    profiles:
      - dev
      - prod
      - web
    environment:
      - PORT=3008
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
    networks:
      - network

  # Analytics Service
  analytics-service:
    image: ${DOCKER_REGISTRY}/${PACKAGE_NAME}-analytics-service:${VERSION:-latest}
    container_name: ${PACKAGE_NAME}_analytics_service
    restart: unless-stopped
    ports:
      - '3007:3007'
    profiles:
      - dev
      - prod
      - analytics
    environment:
      - PORT=3007
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - ORDER_SERVICE_URL=http://order-service:3003
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      - order-service
      - product-service
    networks:
      - network

networks:
  network:
    name: ${PACKAGE_NAME}-network
    driver: bridge
